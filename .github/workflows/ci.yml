name: ci

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Go Vet
        shell: pwsh
        run: go vet ./...

      - name: Unit Tests
        shell: pwsh
        run: go test ./... -timeout 120s

      - name: Performance Gate
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/perf_gate.ps1
